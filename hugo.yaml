        Content: >
          Ph.D. student at Hitotsubashi University, Graduate School of Business Administration.
          
          My research interests include **Asset Pricing**, **Macroeconomics**, and **Behavioral Finance**. I am currently working on projects related to Disaster Risk and Market Efficiency.
          
