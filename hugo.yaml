        Content: >
          一橋大学大学院 経営管理研究科 博士後期課程2年。
          
          **資産価格理論**、**マクロ経済学**、**行動ファイナンス**を専門とし、現在は災害リスク（Disaster Risk）や競馬市場の効率性について研究しています。
          
          [研究内容](/research/work_in_progress) / [経歴・CV](/fixed/cv) / [ノート](/notes/notes_links)
